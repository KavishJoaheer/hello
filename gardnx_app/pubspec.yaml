name: gardnx_app
description: "MYGarden Planner - AI-powered garden planning app for Mauritius."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  go_router: ^14.6.0
  image_picker: ^1.1.0
  image_cropper: ^8.0.0
  cached_network_image: ^3.4.0
  geolocator: ^13.0.0
  permission_handler: ^11.3.0
  dio: ^5.7.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  table_calendar: ^3.1.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  uuid: ^4.5.0
  shared_preferences: ^2.3.3
  firebase_messaging: ^15.1.4
  flutter_local_notifications: ^18.0.1
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: 2.6.4
  mockito: ^5.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/plant_icons/
    - assets/images/onboarding/
    - assets/data/
